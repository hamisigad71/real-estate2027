<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A227"/>
      <stop offset="100%" stop-color="#F0D060"/>
    </linearGradient>
  </defs>

  <!-- White background -->
  <rect width="100" height="100" rx="20" fill="white"/>

  <!-- House outline - left roof -->
  <path d="M10 55 L38 25 L55 42" fill="none" stroke="#7A3F91" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- House outline - left wall & base -->
  <path d="M15 55 L15 80 L42 80 L42 65 L28 65 L28 80" fill="none" stroke="#7A3F91" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Chimney -->
  <rect x="24" y="25" width="7" height="14" rx="1.5" fill="none" stroke="#7A3F91" stroke-width="5"/>

  <!-- Window on house -->
  <rect x="18" y="60" width="10" height="9" rx="1.5" fill="none" stroke="#7A3F91" stroke-width="3.5"/>

  <!-- Small inner house (right) roof -->
  <path d="M50 78 L50 55 L63 43 L76 55 L76 78" fill="none" stroke="#7A3F91" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small inner house base -->
  <path d="M44 78 L82 78" fill="none" stroke="#7A3F91" stroke-width="5" stroke-linecap="round"/>

  <!-- Gold upward arrow shaft -->
  <line x1="58" y1="72" x2="82" y2="22" stroke="url(#goldGrad)" stroke-width="6" stroke-linecap="round"/>

  <!-- Gold arrow head -->
  <polygon points="82,22 68,20 80,32" fill="url(#goldGrad)"/>
</svg>
