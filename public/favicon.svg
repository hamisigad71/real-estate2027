<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2645"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" fill="url(#bgGrad)"/>

  <!-- Roofline -->
  <path d="M18 58 L50 28 L82 58" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Building body -->
  <rect x="28" y="56" width="44" height="24" rx="2" fill="white" opacity="0.1"/>

  <!-- Windows -->
  <rect x="34" y="60" width="8" height="6" rx="1" fill="white" opacity="0.45"/>
  <rect x="58" y="60" width="8" height="6" rx="1" fill="white" opacity="0.45"/>

  <!-- Door -->
  <rect x="45" y="66" width="10" height="14" rx="1.5" fill="white" opacity="0.7"/>

  <!-- Analytics accent line -->
  <path d="M60 50 L68 42 L76 45 L84 33" fill="none" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="84" cy="33" r="2.5" fill="#60a5fa"/>
</svg>
